<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    :root {
      --bg: #7d8f68;
      --screen: #a8bf7a;
      --grid: rgba(38, 56, 22, 0.12);
      --ink: #263816;
      --shadow: #5d6d4b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, #95a57e 0%, #768764 45%, #5f6d4f 100%);
      color: var(--ink);
      font-family: "Courier New", Courier, monospace;
    }

    .phone {
      width: min(92vw, 430px);
      padding: 22px;
      border: 4px solid #445335;
      border-radius: 28px;
      background: linear-gradient(180deg, #879772 0%, #6e7f5b 100%);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.25),
        inset 0 2px 0 rgba(255, 255, 255, 0.15);
    }

    .brand {
      text-align: center;
      font-size: 0.9rem;
      letter-spacing: 0.35rem;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .screen {
      border: 4px solid #445335;
      border-radius: 14px;
      padding: 14px;
      background: var(--screen);
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.1),
        inset 0 8px 18px rgba(255, 255, 255, 0.08);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 3px solid var(--ink);
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        var(--screen);
      background-size: 5% 5%;
      image-rendering: pixelated;
    }

    .message {
      min-height: 2.4em;
      margin-top: 12px;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.3;
      font-weight: 700;
    }

    .controls {
      margin-top: 16px;
      display: grid;
      gap: 14px;
      font-size: 0.85rem;
      text-align: center;
      opacity: 0.9;
    }

    .keys {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .key {
      min-width: 42px;
      padding: 6px 8px;
      border: 2px solid #445335;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.12);
      font-weight: 700;
    }

    .pad {
      display: grid;
      justify-content: center;
      gap: 8px;
      touch-action: manipulation;
    }

    .pad-row {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .pad button {
      width: 52px;
      height: 52px;
      border: 2px solid #445335;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.16);
      color: var(--ink);
      font: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.12);
    }

    .pad button:active {
      transform: translateY(1px);
    }

    @media (max-width: 420px) {
      .phone {
        padding: 16px;
        border-radius: 22px;
      }

      .screen {
        padding: 10px;
      }

      .hud,
      .message {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="brand">Classic Snake</div>
    <section class="screen">
      <div class="hud">
        <span>Score: <span id="score">0</span></span>
        <span>Best: <span id="best">0</span></span>
      </div>
      <canvas id="game" width="360" height="360" aria-label="Snake game"></canvas>
      <div class="message" id="message">Press any arrow key to start.</div>
    </section>
    <div class="controls">
      <div class="keys">
        <span class="key">↑</span>
        <span class="key">↓</span>
        <span class="key">←</span>
        <span class="key">→</span>
        <span class="key">WASD</span>
        <span class="key">Space</span>
      </div>
      <div class="pad" aria-label="Touch controls">
        <div class="pad-row">
          <button type="button" data-dir="up" aria-label="Move up">↑</button>
        </div>
        <div class="pad-row">
          <button type="button" data-dir="left" aria-label="Move left">←</button>
          <button type="button" data-dir="restart" aria-label="Restart game">⟳</button>
          <button type="button" data-dir="right" aria-label="Move right">→</button>
        </div>
        <div class="pad-row">
          <button type="button" data-dir="down" aria-label="Move down">↓</button>
        </div>
      </div>
      <div>Eat the blocks. Don’t hit the wall. Space restarts after game over.</div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const messageEl = document.getElementById("message");

    const gridSize = 18;
    const tileSize = canvas.width / gridSize;
    const baseSpeed = 135;
    const minSpeed = 65;
    const speedStep = 4;
    const bestScoreKey = "snake-best-score";

    let snake;
    let direction;
    let queuedDirection;
    let food;
    let score;
    let bestScore = Number(localStorage.getItem(bestScoreKey) || 0);
    let gameOver;
    let started;
    let loopId;

    bestEl.textContent = bestScore;

    function resetGame() {
      snake = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      queuedDirection = direction;
      score = 0;
      started = false;
      gameOver = false;
      scoreEl.textContent = "0";
      messageEl.textContent = "Press any arrow key to start.";
      placeFood();
      restartLoop();
      draw();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * gridSize),
          y: Math.floor(Math.random() * gridSize)
        };
      } while (snake.some((segment) => segment.x === food.x && segment.y === food.y));
    }

    function setDirection(next) {
      if (gameOver) {
        return;
      }

      const isReverse =
        next.x === -direction.x &&
        next.y === -direction.y &&
        started;

      if (isReverse) {
        return;
      }

      queuedDirection = next;

      if (!started) {
        started = true;
        messageEl.textContent = "Collect the blocks.";
      }
    }

    function update() {
      if (gameOver || !started) {
        draw();
        return;
      }

      direction = queuedDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const willEat = head.x === food.x && head.y === food.y;
      const bodyToCheck = willEat ? snake : snake.slice(0, -1);
      const hitsWall =
        head.x < 0 ||
        head.x >= gridSize ||
        head.y < 0 ||
        head.y >= gridSize;

      const hitsSelf = bodyToCheck.some(
        (segment) => segment.x === head.x && segment.y === head.y
      );

      if (hitsWall || hitsSelf) {
        endGame();
        draw();
        return;
      }

      snake.unshift(head);

      if (willEat) {
        score += 1;
        scoreEl.textContent = String(score);
        messageEl.textContent = "Nice.";

        if (score > bestScore) {
          bestScore = score;
          bestEl.textContent = String(bestScore);
          localStorage.setItem(bestScoreKey, String(bestScore));
        }

        placeFood();
        restartLoop();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      messageEl.textContent = "Game over. Press Space to restart.";
    }

    function restartLoop() {
      window.clearInterval(loopId);
      const speed = Math.max(minSpeed, baseSpeed - score * speedStep);
      loopId = window.setInterval(update, speed);
    }

    function drawCell(x, y, inset = 0) {
      ctx.fillRect(
        x * tileSize + inset,
        y * tileSize + inset,
        tileSize - inset * 2,
        tileSize - inset * 2
      );
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#31461b";
      drawCell(food.x, food.y, tileSize * 0.18);

      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? "#263816" : "#3f5725";
        drawCell(segment.x, segment.y, tileSize * 0.08);
      });

      if (!started && !gameOver) {
        ctx.fillStyle = "rgba(38, 56, 22, 0.15)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === " " || key === "spacebar") {
        if (gameOver) {
          resetGame();
        }
        return;
      }

      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(key)) {
        event.preventDefault();
      }

      if (key === "arrowup" || key === "w") {
        setDirection({ x: 0, y: -1 });
      } else if (key === "arrowdown" || key === "s") {
        setDirection({ x: 0, y: 1 });
      } else if (key === "arrowleft" || key === "a") {
        setDirection({ x: -1, y: 0 });
      } else if (key === "arrowright" || key === "d") {
        setDirection({ x: 1, y: 0 });
      }
    });

    document.querySelectorAll("[data-dir]").forEach((button) => {
      button.addEventListener("pointerdown", () => {
        const action = button.getAttribute("data-dir");

        if (action === "restart") {
          if (gameOver) {
            resetGame();
          }
          return;
        }

        if (action === "up") {
          setDirection({ x: 0, y: -1 });
        } else if (action === "down") {
          setDirection({ x: 0, y: 1 });
        } else if (action === "left") {
          setDirection({ x: -1, y: 0 });
        } else if (action === "right") {
          setDirection({ x: 1, y: 0 });
        }
      });
    });

    resetGame();
  </script>
</body>
</html>
